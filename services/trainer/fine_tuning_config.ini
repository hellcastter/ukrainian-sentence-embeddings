[WANDB]
log_to_wandb = True
wandb_entity=hellcaster-ukrainian-catholic-university
wandb_project_name=СonEFUv2

[PATHS]
path_to_save_fine_tuned_model = models/fine-tuned-models

[TRAINING]
train_data_path = local_datasets/semi_supervised_2/triplets_semi_supervised_all_augs_mixed_300.csv

; also might be mnr_loss, nt_xent_loss, triplet_loss_cosine, triplet_loss
loss_type = triplet_loss_cosine
pool_targets=False
use_both_poolings=False

; train_data_path = local_datasets/ntxent_dataset_1.csv
; loss_type = nt_xent_loss

; model_to_fine_tune = intfloat/multilingual-e5-large-instruct
; tokenizer_name = intfloat/multilingual-e5-large-instruct
; batch_size = 32
; num_batch_to_eval = 600


model_to_fine_tune = sentence-transformers/paraphrase-multilingual-mpnet-base-v2
tokenizer_name = sentence-transformers/paraphrase-multilingual-mpnet-base-v2
batch_size = 104
num_batch_to_eval = 200

[TRAINING_PARAMS]
; set to 0 to unfreeze all layers
layers_to_unfreeze = 0
random_model_weights_reinitialization = False
number_of_layers_for_reinitialization = 3
learning_rate = 2e-6
apply_warmup = True
warmup_ratio = 0.1
num_epochs = 2
early_stopping = 10
enable_gpu_parallel = True
max_grad_norm=1.0
